<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <div class="search-box">
            <input type="text" placeholder="Search location..." class="input-box">
            <button class="fa-solid fa-magnifying-glass" id="searchBtn"></button>
        </div>

        <div class="weather-body" style="display: none;">
            <div class="location-header">
                <h2 id="city-name"></h2>
                <img class="country-flag" src="" alt="flag">
            </div>
            <p id="current-date"></p>

            <img src="assets/cloud.png" alt="Weather Image" class="weather-img">
            
            <div class="weather-box">
                <p class="temperature">0°</p>
                <p class="description">--</p>
            </div>

            <div class="weather-details">
                <div class="detail-item">
                    <i class="fa-solid fa-droplet"></i>
                    <div class="text">
                        <span id="humidity">0%</span>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="detail-item">
                    <i class="fa-solid fa-wind"></i>
                    <div class="text">
                        <span id="wind-speed">0 Km/H</span>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="location-not-found" style="display: none;">
            <h1>Location not found!</h1>
            <img src="assets/404.png" alt="404 Error">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
